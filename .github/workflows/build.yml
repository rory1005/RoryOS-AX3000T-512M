name: Build RoryOS AX3000T 512M

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "test-only"
        type: choice
        options:
          - test-only
          - build

      openwrt_branch:
        description: "OpenWrt branch"
        required: true
        default: "openwrt-24.10"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout RoryOS repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget qemu-utils ccache libelf-dev \
            device-tree-compiler python3 python3-pip python3-pyelftools

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.openwrt_branch }}" \
            https://github.com/openwrt/openwrt.git openwrt
            
      - name: Copy custom files
        run: |
          if [ -d files ]; then
            cp -a files/. openwrt/files/
          fi
          
      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create base config
        working-directory: openwrt
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_xiaomi_mi-router-ax3000t=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y

          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y

          # Avoid interactive kernel option prompts
          # CONFIG_KERNEL_IR_IMON_DECODER is not set
          EOF

          make defconfig

      - name: Download sources
        if: ${{ github.event.inputs.build_mode == 'build' }}
        working-directory: openwrt
        run: |
          make download -j$(nproc) V=s

      - name: Build firmware
        if: ${{ github.event.inputs.build_mode == 'build' }}
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s

      - name: List build output
        run: |
          echo "===== OpenWrt target output ====="
          if [ -d openwrt/bin/targets ]; then
              find openwrt/bin/targets
          else
              echo "No firmware generated (test-only mode)."
          fi
          
      - name: Upload full target output
        if: ${{ github.event.inputs.build_mode == 'build' }}
        uses: actions/upload-artifact@v4
        with:
          name: roryos-ax3000t-512m-full-output
          path: openwrt/bin/targets/
